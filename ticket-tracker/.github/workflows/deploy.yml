name: Generate & Deploy Report

on:
  schedule:
    - cron: "*/30 6-18 * * 0-4"  # Every 30 min, Sun-Thu 6am-6pm (UAE work hours)
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx python-dotenv pandas plotly

      - name: Generate report
        env:
          SOLARWINDS_API_TOKEN: ${{ secrets.SOLARWINDS_API_TOKEN }}
          SOLARWINDS_REGION: ${{ secrets.SOLARWINDS_REGION }}
        run: python generate_report.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
